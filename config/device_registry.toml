# metalForge Device Registry
# Declares all infrastructure hardware in the topology.
# Probes validate the physical world matches these declarations.
#
# Secrets (WiFi PSK, etc.) are NEVER stored here.
# Use METALFORGE_WIFI_PSK env var for WiFi password validation.

# ─────────────────────────────────────────────────────────────
# WiFi Access Points
# ─────────────────────────────────────────────────────────────

[devices.flint2_house2]
type = "wifi_ap"
model = "GL-MT6000"
firmware = "openwrt-glinet"
ip = "192.168.4.250"
ssh_user = "root"
site = "house2"
mac_bridge = "94:83:C4:E0:62:B0"
note = "Bridge mode. DHCP from sporeGate via SG605S → Omada. MediaTek driver reads .dat files for radio config."

[devices.flint2_house2.radios.band_2g]
dat_path = "/etc/wireless/mediatek/mt7986-ax6000.dbdc.b0.dat"
ssid = "ApertureScience"
auth_mode = "WPA2PSK"
encryp_type = "AES"

[devices.flint2_house2.radios.band_5g]
dat_path = "/etc/wireless/mediatek/mt7986-ax6000.dbdc.b1.dat"
ssid = "ApertureScience"
auth_mode = "WPA2PSK"
encryp_type = "AES"

[devices.flint2_house1]
type = "router"
model = "GL-MT6000"
firmware = "openwrt-glinet-4.8.4"
ip = "192.168.4.1"
ssh_user = "root"
site = "house1"
mac_bridge = "94:83:C4:E0:63:5A"
mac_wan = "94:83:C4:E0:63:58"
serial = "7b9ae0d561478fa2"
role = "edge_router"
wan_ip = "162.226.225.148"
wan_mode = "att_ip_passthrough"
services = ["nat", "dhcp", "dns", "firewall", "wifi", "sovereign-dns-blocklist"]
note = "Edge router (promoted Jun 27, Wave 127). ATT IP Passthrough to WAN MAC. NAT/DHCP/DNS/firewall. Sovereign DNS blocklist (91k rules). Port forwards to sporeGate for WG/SSH/HTTP/HTTPS/RustDesk/TURN/NestGate. LAN: 192.168.4.1/22. WAN: eth1 → ATT BGW320."

[devices.flint2_house1.radios.band_2g]
dat_path = "/etc/wireless/mediatek/mt7986-ax6000.dbdc.b0.dat"
ssid = "Aperture Science"
auth_mode = "WPA2PSK"
encryp_type = "AES"
channel = 1
role = "iot"
note = "IoT devices, legacy compat. Standard non-overlapping ch1."

[devices.flint2_house1.radios.band_5g]
dat_path = "/etc/wireless/mediatek/mt7986-ax6000.dbdc.b1.dat"
ssid = "BlackMesa"
auth_mode = "WPA2PSK"
encryp_type = "AES"
channel = 44
role = "user"
note = "User devices, high-speed. HE80 WiFi 6."

# Confirmed port mapping for GL-MT6000 (GL.iNet firmware 4.8.4)
# Physical labels do NOT always match UCI names in WAN/LAN combo mode.
[devices.flint2_house1.port_map]
WAN = { uci = "eth1", speed_mbps = 2500, role = "wan", note = "ATT BGW320 uplink. IP Passthrough active." }
LAN1 = { uci = "lan1", speed_mbps = 2500, role = "lan_trunk", note = "CRS310 backbone (2.5G, primary LAN distribution)" }
LAN2 = { uci = "lan2", speed_mbps = 1000, role = "available" }
LAN3 = { uci = "lan3", speed_mbps = 1000, role = "available" }
LAN4 = { uci = "lan4", speed_mbps = 1000, role = "available" }
LAN5 = { uci = "lan5", speed_mbps = 1000, role = "available" }

# ─────────────────────────────────────────────────────────────
# Switches
# ─────────────────────────────────────────────────────────────

[devices.crs310_backbone]
type = "switch"
model = "MikroTik CRS310-8G+2S+IN"
ip = "192.168.4.2"
site = "house1"
note = "Credentials unknown — needs physical reset (5s hold). Management at 192.168.4.2. ALL 8 RJ45 ports are 2.5G."

[devices.crs310_backbone.port_map]
ether1 = { speed_mbps = 2500, role = "available" }
ether2 = { speed_mbps = 2500, role = "available" }
ether3 = { speed_mbps = 2500, role = "available" }
ether4 = { speed_mbps = 2500, role = "available" }
ether5 = { speed_mbps = 2500, role = "gate", note = "northGate (Win/5090)" }
ether6 = { speed_mbps = 2500, role = "ap", note = "Flint 2 #2 House 1 (lan1)" }
ether7 = { speed_mbps = 2500, role = "available" }
ether8 = { speed_mbps = 2500, role = "uplink", note = "sporeGate eno1" }
"sfp+1" = { speed_mbps = 10000, role = "trunk", note = "Omada SX3008F (80m AOC)" }
"sfp+2" = { speed_mbps = 10000, role = "gate", note = "eastGate (10G compute)" }

[devices.omada_house2]
type = "switch"
model = "TP-Link Omada SX3008F"
ip = "192.168.4.111"
management_ip = "10.0.4.1"
site = "house2"
ports = [
    "sfp+ ← CRS310 sfp+1 (10G trunk from backbone)",
    "2.5G ports → compute towers, NUCs, fieldGate",
]
note = "Management at 10.0.4.1 (separate VLAN). Uplink 10G AOC from CRS310."

[devices.sg605s_expansion]
type = "switch"
model = "TP-Link TL-SG605S-M2"
ip = "0.0.0.0"
site = "house2"
ports = [
    "port1 ← Omada (2.5G uplink)",
    "port2 → Flint 2 (WiFi AP)",
    "port3-5 → available",
]
note = "Unmanaged L2 switch — no IP stack, no ICMP response. Probe via downstream device reachability (Flint 2)."

# ─────────────────────────────────────────────────────────────
# Gateways
# ─────────────────────────────────────────────────────────────

[devices.bgw320_att]
type = "gateway"
model = "AT&T BGW320-505"
ip = "192.168.1.254"
site = "house1"
note = "IP Passthrough active (Jun 27, Wave 127). Public IP passed to Flint H1 WAN MAC (94:83:C4:E0:63:58). WiFi disabled. UDP port 51820 has mapping bug — use 51821 for WireGuard."

# ─────────────────────────────────────────────────────────────
# Compute Nodes
# ─────────────────────────────────────────────────────────────

[devices.sporegate]
type = "compute_node"
model = "NUC (custom)"
ip = "192.168.4.3"
site = "house1"
role = "compute"
wg_ip = "10.13.37.2"
services = ["wireguard_hub", "caddy", "forgejo", "rustdesk", "turn", "nestgate"]
note = "Demoted from edge router Jun 27 (Wave 127). Ephemeral compute node — network survives unplug/reboot. No dnsmasq, no NAT. Gateway: Flint at .1. All inbound traffic port-forwarded from Flint."
